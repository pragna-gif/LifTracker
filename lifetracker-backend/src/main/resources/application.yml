server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/lifetracker
    username: lifetracker
    password: lifetracker123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:change-this-jwt-secret-in-production}
    expiration-ms: 86400000   # 24 hours

# Google Gemini — free at aistudio.google.com → Get API Key
gemini:
  api-key: ${GEMINI_API_KEY:your-gemini-api-key-here}

# CORS – allow React dev server
spring.mvc.cors:
  allowed-origins: "http://localhost:3000"
